name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax-check app-bestanden
        run: |
          node --check app.js
          node --check sw.js
          node --check version.js
      - name: Testsuite
        run: node tests/run.js
