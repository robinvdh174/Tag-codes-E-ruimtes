<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>E-Kast Zoeker</title>
<style>
:root{--bg:#0d0f12;--surface:#151820;--border:#2a3045;--accent:#f0a500;--text:#dde3f0;--muted:#5a6380;--danger:#e03c3c;--success:#2ecc71;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:sans-serif;padding-bottom:2rem;}
header{background:var(--surface);border-bottom:2px solid var(--accent);padding:.75rem 1.2rem;position:sticky;top:0;z-index:100;}
.header-row{display:flex;justify-content:space-between;align-items:center;}
h1{font-size:1.3rem;font-weight:900;}
p.sub{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.sync-badge{display:flex;align-items:center;gap:.4rem;font-size:.7rem;font-weight:700;padding:.3rem .6rem;border-radius:20px;border:1px solid var(--border);white-space:nowrap;cursor:pointer;transition:all .2s;}
.sync-badge.idle{color:var(--muted);border-color:var(--border);}
.sync-badge.syncing{color:#4a9eff;border-color:#4a9eff;animation:pulse 1s infinite;}
.sync-badge.ok{color:var(--success);border-color:var(--success);}
.sync-badge.error{color:var(--danger);border-color:var(--danger);}
.sync-badge.offline{color:#f39c12;border-color:#f39c12;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);padding:0 1.2rem;}
.tab{flex:1;padding:.75rem .5rem;background:none;border:none;color:var(--muted);font-size:.85rem;font-weight:700;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
main{padding:1rem 1.2rem;}
.panel{display:none;}.panel.active{display:block;}
input[type=text],textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:.75rem 1rem;color:var(--text);font-size:1rem;outline:none;font-family:monospace;-webkit-appearance:none;}
input[type=text]:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:60px;font-family:sans-serif;}
.form-group{margin-bottom:1rem;}
label{display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
.btn-primary{width:100%;padding:1rem;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:1rem;font-weight:900;cursor:pointer;margin-top:.3rem;}
.count{font-size:.75rem;color:var(--muted);margin-bottom:.8rem;font-family:monospace;}
.count b{color:var(--accent);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.7rem;border-left:3px solid var(--accent);position:relative;cursor:pointer;}
.card.selected{border-color:var(--accent);background:#222a3f;box-shadow:0 0 0 2px var(--accent);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;}
.card-info{flex:1;min-width:0;}
.code{font-family:monospace;font-size:1rem;color:var(--accent);margin-bottom:.3rem;word-break:break-all;}
.loc{font-size:.95rem;font-weight:700;}
.note{font-size:.8rem;color:#7a8aaa;font-style:italic;margin-top:.3rem;}
.pos{font-size:.8rem;color:#a0c4ff;margin-top:.2rem;}
.meta{font-size:.7rem;color:var(--muted);margin-top:.3rem;}
.sbtn-veilig{display:inline-block;padding:.25rem .7rem;border-radius:20px;border:1px solid #2ecc71;background:#1a3a2a;color:#2ecc71;font-size:.72rem;cursor:pointer;font-family:sans-serif;font-weight:700;}
.sbtn-veilig.secured{border-color:#f0a500;background:#3a2a00;color:#f0a500;}
.btn-pencil{background:none;border:none;cursor:pointer;padding:.3rem;color:var(--muted);flex-shrink:0;opacity:.6;}
.btn-pencil svg{width:18px;height:18px;display:block;}
.edit-actions{display:none;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);}
.edit-actions.open{display:block;}
.btn-save{padding:.5rem 1.2rem;background:var(--accent);color:#000;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:.9rem;}
.btn-delete{padding:.5rem 1.2rem;background:transparent;color:var(--danger);border:1px solid var(--danger);border-radius:6px;font-weight:700;cursor:pointer;font-size:.9rem;}
.empty{text-align:center;color:var(--muted);padding:3rem 1rem;font-size:.9rem;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;width:90%;max-width:400px;max-height:85vh;overflow-y:auto;}
.modal h2{font-size:1.1rem;margin-bottom:1rem;}
.modal-actions{display:flex;gap:.7rem;margin-top:1rem;}
.modal-actions button{flex:1;}
.btn-cancel{padding:.75rem;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;font-weight:700;cursor:pointer;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:.6rem 1.4rem;border-radius:20px;font-size:.85rem;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.search-wrap{position:relative;margin-bottom:1rem;}
.search-wrap input{padding-right:2.5rem;}
.clear-btn{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:.2rem .5rem;display:none;}
.clear-btn.visible{display:block;}
.filter-row{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;}
.filter-chip{padding:.35rem .9rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.75rem;font-weight:700;cursor:pointer;}
.filter-chip.active{background:var(--accent);color:#000;border-color:var(--accent);}
.scan-area{display:flex;gap:.5rem;margin-bottom:1rem;}
.scan-area input{flex:1;}
.btn-scan{padding:.75rem 1rem;background:var(--surface);border:1.5px solid var(--accent);color:var(--accent);border-radius:8px;font-weight:700;cursor:pointer;white-space:nowrap;font-size:.9rem;}
.result-highlight{background:#2a1f00;border-color:var(--accent);}
.card-actions{display:flex;gap:.5rem;margin-top:.6rem;flex-wrap:wrap;}
.btn-ruimte-info{padding:.3rem .8rem;background:transparent;border:1px solid #4a9eff;color:#4a9eff;border-radius:6px;font-size:.75rem;font-weight:700;cursor:pointer;}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>E-Kast Zoeker</h1>
      <p class="sub">Tag-codes & E-ruimtes</p>
    </div>
    <button class="sync-badge idle" id="syncBadge" onclick="manualSync()">
      <span class="sync-dot"></span>
      <span id="syncLabel">Sync</span>
    </button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('zoeken',this)">Zoeken</button>
  <button class="tab" onclick="switchTab('toevoegen',this)">+ Toevoegen</button>
  <button class="tab" onclick="switchTab('ruimtes',this)">Ruimtes</button>
</div>

<main>

<!-- TAB: ZOEKEN -->
<div class="panel active" id="tab-zoeken">
  <div class="scan-area">
    <input type="text" id="scanInput" placeholder="Scan of typ tag-code…" autocomplete="off" autocorrect="off" spellcheck="false" oninput="onScanInput()" onkeydown="onScanKey(event)">
    <button class="btn-scan" onclick="openScanModal()">&#x1F4F7; Scan</button>
  </div>
  <div class="filter-row" id="filterRow"></div>
  <div class="count" id="countLabel"></div>
  <div id="cardList"></div>
</div>

<!-- TAB: TOEVOEGEN -->
<div class="panel" id="tab-toevoegen">
  <div class="form-group">
    <label>Tag-code (barcode/QR)</label>
    <input type="text" id="newCode" placeholder="bijv. E-001 of scan…" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="form-group">
    <label>Locatie / kast</label>
    <input type="text" id="newLoc" placeholder="bijv. Serverruimte A, Rack 3">
  </div>
  <div class="form-group">
    <label>Component / apparaat</label>
    <input type="text" id="newComponent" placeholder="bijv. Switch, Patch panel, UPS…">
  </div>
  <div class="form-group">
    <label>Positie in kast</label>
    <input type="text" id="newPos" placeholder="bijv. U12, bovenste plank">
  </div>
  <div class="form-group">
    <label>Notitie</label>
    <textarea id="newNote" placeholder="Optionele notitie…"></textarea>
  </div>
  <div class="form-group">
    <label>Ruimte</label>
    <input type="text" id="newRuimte" placeholder="bijv. Ruimte 1.02" list="ruimteList">
    <datalist id="ruimteList"></datalist>
  </div>
  <button class="btn-primary" onclick="addEntry()">Opslaan</button>
</div>

<!-- TAB: RUIMTES -->
<div class="panel" id="tab-ruimtes">
  <div class="form-group">
    <label>Naam ruimte</label>
    <input type="text" id="newRuimteName" placeholder="bijv. Ruimte 1.02">
  </div>
  <div class="form-group">
    <label>Beschrijving</label>
    <textarea id="newRuimteDesc" placeholder="Optionele beschrijving…"></textarea>
  </div>
  <button class="btn-primary" onclick="addRuimte()">Ruimte toevoegen</button>
  <div style="margin-top:1.5rem;">
    <div class="count" id="ruimteCount"></div>
    <div id="ruimteList2"></div>
  </div>
</div>

</main>

<!-- MODAL: BEWERKEN -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>Bewerken</h2>
    <div class="form-group">
      <label>Tag-code</label>
      <input type="text" id="editCode">
    </div>
    <div class="form-group">
      <label>Locatie / kast</label>
      <input type="text" id="editLoc">
    </div>
    <div class="form-group">
      <label>Component / apparaat</label>
      <input type="text" id="editComponent">
    </div>
    <div class="form-group">
      <label>Positie in kast</label>
      <input type="text" id="editPos">
    </div>
    <div class="form-group">
      <label>Notitie</label>
      <textarea id="editNote"></textarea>
    </div>
    <div class="form-group">
      <label>Ruimte</label>
      <input type="text" id="editRuimte" list="ruimteListEdit">
      <datalist id="ruimteListEdit"></datalist>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">Annuleren</button>
      <button class="btn-save" onclick="saveEdit()">Opslaan</button>
    </div>
    <div style="margin-top:.7rem;">
      <button class="btn-delete" style="width:100%;" onclick="deleteEntry()">Verwijderen</button>
    </div>
  </div>
</div>

<!-- MODAL: SCAN -->
<div class="modal-overlay" id="scanModal">
  <div class="modal">
    <h2>Scan tag-code</h2>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:1rem;">Gebruik een Bluetooth barcodescanner of typ de code hieronder.</p>
    <div class="form-group">
      <input type="text" id="scanModalInput" placeholder="Scan of typ code…" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="onScanModalKey(event)">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeScanModal()">Annuleren</button>
      <button class="btn-save" onclick="confirmScan()">Zoeken</button>
    </div>
  </div>
</div>

<!-- MODAL: RUIMTE INFO -->
<div class="modal-overlay" id="ruimteInfoModal">
  <div class="modal">
    <h2 id="ruimteInfoTitle">Ruimte info</h2>
    <p id="ruimteInfoDesc" style="color:var(--muted);font-size:.9rem;margin-bottom:1rem;"></p>
    <div id="ruimteInfoCards"></div>
    <div class="modal-actions">
      <button class="btn-cancel" style="width:100%;" onclick="closeRuimteInfoModal()">Sluiten</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxemCN0Mxfv9BbqfvnF6V8Ia5bWnxVBOg-Q3z4F8h8mGGwyCx95ZiS0C4yPSBLBtFAA/exec';
const LS_KEY   = 'ekast_entries_v3';
const LS_RUIMTES = 'ekast_ruimtes_v1';
const SYNC_INTERVAL = 60000;

// ============================================================
// STATE
// ============================================================
let entries  = [];
let ruimtes  = [];
let editIdx  = null;
let filterActive = 'all';
let lastSync = null;
let syncing  = false;
let syncTimer = null;
let offlineMode = false;

// ============================================================
// INIT
// ============================================================
function init(){
  loadLocal();
  renderAll();
  scheduleSync();
  syncWithSheet();
}

// ============================================================
// LOCAL STORAGE
// ============================================================
function loadLocal(){
  try{
    const d = localStorage.getItem(LS_KEY);
    entries = d ? JSON.parse(d) : [];
  }catch(e){ entries=[]; }
  try{
    const r = localStorage.getItem(LS_RUIMTES);
    ruimtes = r ? JSON.parse(r) : [];
  }catch(e){ ruimtes=[]; }
}

function saveLocal(){
  localStorage.setItem(LS_KEY, JSON.stringify(entries));
  localStorage.setItem(LS_RUIMTES, JSON.stringify(ruimtes));
}

// ============================================================
// SYNC WITH GOOGLE SHEETS
// ============================================================
function scheduleSync(){
  if(syncTimer) clearInterval(syncTimer);
  syncTimer = setInterval(syncWithSheet, SYNC_INTERVAL);
}

async function syncWithSheet(){
  if(syncing) return;
  syncing = true;
  setSyncBadge('syncing','Syncing…');
  try{
    // PULL
    const resp = await fetch(SHEET_URL+'?action=getAll', {cache:'no-store'});
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const data = await resp.json();

    if(Array.isArray(data.entries)){
      entries = data.entries;
    }
    if(Array.isArray(data.ruimtes)){
      ruimtes = data.ruimtes;
    }
    saveLocal();
    renderAll();
    lastSync = new Date();
    offlineMode = false;
    setSyncBadge('ok','Gesynchroniseerd');
    setTimeout(()=>setSyncBadge('idle','Sync'),3000);
  }catch(e){
    offlineMode = true;
    setSyncBadge('offline','Offline');
    console.warn('Sync failed:',e);
  }finally{
    syncing = false;
  }
}

async function pushToSheet(action, payload){
  try{
    const resp = await fetch(SHEET_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action, ...payload})
    });
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const result = await resp.json();
    return result;
  }catch(e){
    console.warn('Push failed:',e);
    return null;
  }
}

function manualSync(){
  setSyncBadge('syncing','Syncing…');
  syncWithSheet();
}

function setSyncBadge(state, label){
  const b = document.getElementById('syncBadge');
  const l = document.getElementById('syncLabel');
  b.className = 'sync-badge '+state;
  l.textContent = label;
}

// ============================================================
// RENDER
// ============================================================
function renderAll(){
  renderCards();
  renderRuimtes();
  updateRuimteDatalist();
}

function getFilteredEntries(){
  const q = (document.getElementById('scanInput')?.value||'').trim().toLowerCase();
  let list = entries;
  if(filterActive !== 'all'){
    list = list.filter(e=> (e.ruimte||'') === filterActive);
  }
  if(q){
    list = list.filter(e=>
      (e.code||'').toLowerCase().includes(q)||
      (e.loc||'').toLowerCase().includes(q)||
      (e.component||'').toLowerCase().includes(q)||
      (e.note||'').toLowerCase().includes(q)||
      (e.pos||'').toLowerCase().includes(q)||
      (e.ruimte||'').toLowerCase().includes(q)
    );
  }
  return list;
}

function renderCards(){
  const list = getFilteredEntries();
  const q = (document.getElementById('scanInput')?.value||'').trim().toLowerCase();
  const container = document.getElementById('cardList');
  const countEl   = document.getElementById('countLabel');
  const filterRow = document.getElementById('filterRow');

  // Filter chips
  const ruimteNames = [...new Set(entries.map(e=>e.ruimte||'').filter(Boolean))].sort();
  let chips = `<button class="filter-chip ${filterActive==='all'?'active':''}" onclick="setFilter('all')">Alle</button>`;
  ruimteNames.forEach(r=>{
    chips += `<button class="filter-chip ${filterActive===r?'active':''}" onclick="setFilter(${JSON.stringify(r)})">${r}</button>`;
  });
  filterRow.innerHTML = chips;

  countEl.innerHTML = `<b>${list.length}</b> van <b>${entries.length}</b> items`;

  if(!list.length){
    container.innerHTML = `<div class="empty">${entries.length?'Geen resultaten gevonden.':'Nog geen items. Voeg er een toe!'}</div>`;
    return;
  }

  container.innerHTML = list.map((e,i)=>{
    const globalIdx = entries.indexOf(e);
    const hl = q && (
      (e.code||'').toLowerCase().includes(q)||
      (e.loc||'').toLowerCase().includes(q)||
      (e.component||'').toLowerCase().includes(q)
    ) ? 'result-highlight' : '';
    return `
    <div class="card ${hl}" onclick="selectCard(this,${globalIdx})">
      <div class="card-top">
        <div class="card-info">
          <div class="code">${esc(e.code||'—')}</div>
          <div class="loc">${esc(e.loc||'—')}</div>
          ${e.component?`<div class="pos" style="color:#f0a500;">&#x1F527; ${esc(e.component)}</div>`:''}
          ${e.pos?`<div class="pos">&#x1F4CD; ${esc(e.pos)}</div>`:''}
          ${e.note?`<div class="note">${esc(e.note)}</div>`:''}
          ${e.ruimte?`<div class="meta">&#x1F3E2; ${esc(e.ruimte)}</div>`:''}
        </div>
        <button class="btn-pencil" onclick="event.stopPropagation();openEdit(${globalIdx})" title="Bewerken">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
      ${e.ruimte ? `
      <div class="card-actions">
        <button class="btn-ruimte-info" onclick="event.stopPropagation();openRuimteInfo(${JSON.stringify(e.ruimte)})">&#x1F6C8; Ruimte info</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

function renderRuimtes(){
  const container = document.getElementById('ruimteList2');
  const countEl   = document.getElementById('ruimteCount');
  if(!container) return;
  countEl.innerHTML = `<b>${ruimtes.length}</b> ruimtes`;
  if(!ruimtes.length){
    container.innerHTML = `<div class="empty">Nog geen ruimtes aangemaakt.</div>`;
    return;
  }
  container.innerHTML = ruimtes.map((r,i)=>{
    const count = entries.filter(e=>e.ruimte===r.name).length;
    return `
    <div class="card">
      <div class="card-top">
        <div class="card-info">
          <div class="loc">${esc(r.name)}</div>
          ${r.desc?`<div class="note">${esc(r.desc)}</div>`:''}
          <div class="meta">${count} item${count!==1?'s':''}</div>
        </div>
        <button class="btn-pencil" onclick="deleteRuimte(${i})" title="Verwijderen" style="color:var(--danger);opacity:1;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function updateRuimteDatalist(){
  ['ruimteList','ruimteListEdit'].forEach(id=>{
    const dl = document.getElementById(id);
    if(!dl) return;
    dl.innerHTML = ruimtes.map(r=>`<option value="${esc(r.name)}">`).join('');
  });
}

// ============================================================
// FILTER
// ============================================================
function setFilter(val){
  filterActive = val;
  renderCards();
}

// ============================================================
// SCAN INPUT
// ============================================================
function onScanInput(){
  const val = document.getElementById('scanInput').value;
  document.querySelector('.clear-btn') && (document.querySelector('.clear-btn').className = 'clear-btn'+(val?' visible':''));
  renderCards();
}

function onScanKey(e){
  if(e.key==='Enter'){
    const q = document.getElementById('scanInput').value.trim();
    const list = getFilteredEntries();
    if(list.length===1) showToast('✓ '+list[0].code+' — '+list[0].loc);
  }
}

function clearSearch(){
  document.getElementById('scanInput').value='';
  onScanInput();
}

// ============================================================
// CARD SELECT
// ============================================================
function selectCard(el, idx){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
}

// ============================================================
// ADD ENTRY
// ============================================================
async function addEntry(){
  const code = document.getElementById('newCode').value.trim();
  const loc  = document.getElementById('newLoc').value.trim();
  const component = document.getElementById('newComponent').value.trim();
  const pos  = document.getElementById('newPos').value.trim();
  const note = document.getElementById('newNote').value.trim();
  const ruimte = document.getElementById('newRuimte').value.trim();
  if(!code||!loc){ showToast('Vul code en locatie in!'); return; }
  const entry = {code,loc,component,pos,note,ruimte,ts:Date.now()};
  entries.push(entry);
  saveLocal();
  renderAll();
  showToast('Opgeslagen!');
  ['newCode','newLoc','newComponent','newPos','newNote','newRuimte'].forEach(id=>document.getElementById(id).value='');
  await pushToSheet('add', {entry});
}

// ============================================================
// EDIT MODAL
// ============================================================
function openEdit(idx){
  editIdx = idx;
  const e = entries[idx];
  document.getElementById('editCode').value = e.code||'';
  document.getElementById('editLoc').value  = e.loc||'';
  document.getElementById('editComponent').value = e.component||'';
  document.getElementById('editPos').value  = e.pos||'';
  document.getElementById('editNote').value = e.note||'';
  document.getElementById('editRuimte').value = e.ruimte||'';
  document.getElementById('editModal').classList.add('open');
}

function closeEditModal(){
  document.getElementById('editModal').classList.remove('open');
  editIdx = null;
}

async function saveEdit(){
  if(editIdx===null) return;
  const e = entries[editIdx];
  e.code = document.getElementById('editCode').value.trim();
  e.loc  = document.getElementById('editLoc').value.trim();
  e.component = document.getElementById('editComponent').value.trim();
  e.pos  = document.getElementById('editPos').value.trim();
  e.note = document.getElementById('editNote').value.trim();
  e.ruimte = document.getElementById('editRuimte').value.trim();
  e.ts   = Date.now();
  saveLocal();
  renderAll();
  closeEditModal();
  showToast('Bijgewerkt!');
  await pushToSheet('update', {entry: e, oldCode: e.code});
}

async function deleteEntry(){
  if(editIdx===null) return;
  const e = entries[editIdx];
  if(!confirm('Verwijder dit item?')) return;
  entries.splice(editIdx,1);
  saveLocal();
  renderAll();
  closeEditModal();
  showToast('Verwijderd.');
  await pushToSheet('delete', {code: e.code, ts: e.ts});
}

// ============================================================
// SCAN MODAL
// ============================================================
function openScanModal(){
  document.getElementById('scanModalInput').value='';
  document.getElementById('scanModal').classList.add('open');
  setTimeout(()=>document.getElementById('scanModalInput').focus(),100);
}

function closeScanModal(){
  document.getElementById('scanModal').classList.remove('open');
}

function confirmScan(){
  const val = document.getElementById('scanModalInput').value.trim();
  if(!val) return;
  document.getElementById('scanInput').value = val;
  closeScanModal();
  onScanInput();
  switchTab('zoeken', document.querySelector('.tab'));
}

function onScanModalKey(e){
  if(e.key==='Enter') confirmScan();
}

// ============================================================
// RUIMTES
// ============================================================
async function addRuimte(){
  const name = document.getElementById('newRuimteName').value.trim();
  const desc = document.getElementById('newRuimteDesc').value.trim();
  if(!name){ showToast('Vul een naam in!'); return; }
  if(ruimtes.find(r=>r.name===name)){ showToast('Ruimte bestaat al!'); return; }
  const ruimte = {name, desc, ts:Date.now()};
  ruimtes.push(ruimte);
  saveLocal();
  renderAll();
  showToast('Ruimte toegevoegd!');
  document.getElementById('newRuimteName').value='';
  document.getElementById('newRuimteDesc').value='';
  await pushToSheet('addRuimte', {ruimte});
}

async function deleteRuimte(idx){
  const r = ruimtes[idx];
  if(!confirm(`Ruimte "${r.name}" verwijderen?`)) return;
  ruimtes.splice(idx,1);
  saveLocal();
  renderAll();
  showToast('Ruimte verwijderd.');
  await pushToSheet('deleteRuimte', {name: r.name});
}

// ============================================================
// RUIMTE INFO MODAL
// ============================================================
function openRuimteInfo(ruimteName){
  const ruimte = ruimtes.find(r=>r.name===ruimteName);
  const items  = entries.filter(e=>e.ruimte===ruimteName);
  document.getElementById('ruimteInfoTitle').textContent = ruimteName;
  document.getElementById('ruimteInfoDesc').textContent  = ruimte?.desc || '';
  document.getElementById('ruimteInfoCards').innerHTML   = items.length
    ? items.map(e=>`
      <div class="card" style="cursor:default;">
        <div class="code">${esc(e.code||'—')}</div>
        <div class="loc">${esc(e.loc||'—')}</div>
        ${e.component?`<div class="pos" style="color:#f0a500;">&#x1F527; ${esc(e.component)}</div>`:''}
        ${e.pos?`<div class="pos">&#x1F4CD; ${esc(e.pos)}</div>`:''}
        ${e.note?`<div class="note">${esc(e.note)}</div>`:''}
      </div>`).join('')
    : `<div class="empty">Geen items in deze ruimte.</div>`;
  document.getElementById('ruimteInfoModal').classList.add('open');
}

function closeRuimteInfoModal(){
  document.getElementById('ruimteInfoModal').classList.remove('open');
}

// ============================================================
// TABS
// ============================================================
function switchTab(name, btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  // find tab button by its onclick
  document.querySelectorAll('.tab').forEach(t=>{
    if(t.getAttribute('onclick')&&t.getAttribute('onclick').includes("'"+name+"'"))
      t.classList.add('active');
  });
}

// ============================================================
// HELPERS
// ============================================================
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove("show"), 2500);
}

// ============================================================
// START
// ============================================================
init();
</script>
</body>
</html>
