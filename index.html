<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>E-Kast Zoeker</title>
<style>
:root{--bg:#0d0f12;--surface:#151820;--border:#2a3045;--accent:#f0a500;--text:#dde3f0;--muted:#5a6380;--danger:#e03c3c;--success:#2ecc71;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:sans-serif;padding-bottom:2rem;}
header{background:var(--surface);border-bottom:2px solid var(--accent);padding:1rem 1.2rem;position:sticky;top:0;z-index:100;}
h1{font-size:1.3rem;font-weight:900;}
p.sub{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);padding:0 1.2rem;}
.tab{flex:1;padding:.75rem .5rem;background:none;border:none;color:var(--muted);font-size:.85rem;font-weight:700;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
main{padding:1rem 1.2rem;}
.panel{display:none;}.panel.active{display:block;}
input[type=text],textarea,select{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:.75rem 1rem;color:var(--text);font-size:1rem;outline:none;font-family:sans-serif;-webkit-appearance:none;}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:60px;font-family:sans-serif;}
select option{background:var(--surface);}
.form-group{margin-bottom:1rem;}
label{display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
.btn-primary{width:100%;padding:1rem;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:1rem;font-weight:900;cursor:pointer;margin-top:.3rem;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.count{font-size:.75rem;color:var(--muted);margin-bottom:.8rem;font-family:monospace;}
.count b{color:var(--accent);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.7rem;border-left:3px solid var(--accent);position:relative;cursor:pointer;transition:border-color .15s,background .15s;}
.card.selected{border-color:var(--accent);background:#222a3f;box-shadow:0 0 0 2px var(--accent);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;}
.card-info{flex:1;min-width:0;}
.code{font-family:monospace;font-size:1rem;color:var(--accent);margin-bottom:.3rem;word-break:break-all;}
.loc{font-size:.95rem;font-weight:700;margin-bottom:.2rem;}
.note{font-size:.8rem;color:#7a8aaa;font-style:italic;margin-top:.3rem;}
.card-meta{font-size:.7rem;color:var(--muted);margin-top:.3rem;font-family:monospace;}
.status-bar{display:flex;gap:.4rem;margin-top:.6rem;}
.status-btn{flex:1;padding:.4rem;border-radius:6px;border:1px solid var(--border);background:#1c2030;color:var(--muted);font-size:.75rem;cursor:pointer;text-align:center;font-family:sans-serif;}
.status-btn.active-ok{background:#1a3a2a;border-color:var(--success);color:var(--success);font-weight:700;}
.status-btn.active-warn{background:#3a2a00;border-color:#f0a500;color:#f0a500;font-weight:700;}
.status-btn.active-err{background:#3a1a1a;border-color:var(--danger);color:var(--danger);font-weight:700;}
.btn-pencil{background:none;border:none;cursor:pointer;padding:.3rem;color:var(--muted);flex-shrink:0;opacity:.6;}
.btn-pencil svg{width:18px;height:18px;display:block;}
.edit-actions{display:none;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);}
.edit-actions.open{display:block;}
.btn-bewerk{width:100%;padding:.6rem;border-radius:6px;border:1px solid var(--border);background:#1c2030;color:var(--muted);font-size:.8rem;cursor:pointer;text-align:center;margin-bottom:.5rem;font-family:sans-serif;}
.btn-delete{width:100%;padding:.6rem;border-radius:6px;border:1px solid var(--border);background:#1c2030;color:var(--muted);font-size:.8rem;cursor:pointer;position:relative;overflow:hidden;user-select:none;-webkit-user-select:none;text-align:center;font-family:sans-serif;}
.btn-delete.holding{border-color:var(--danger);color:var(--danger);}
.hold-bar{position:absolute;left:0;top:0;bottom:0;width:0%;background:rgba(224,60,60,.3);}
.btn-delete span{position:relative;z-index:1;}
.hold-hint{font-size:.65rem;color:var(--muted);margin-top:.3rem;opacity:.7;text-align:center;}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty b{display:block;color:var(--text);font-size:1.1rem;margin:.5rem 0 .3rem;}
.filter{display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.5rem;margin-bottom:1rem;}
.chip{padding:.35rem .8rem;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:.75rem;white-space:nowrap;cursor:pointer;font-family:monospace;}
.chip.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.section-title{font-size:.7rem;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.12em;margin-bottom:.8rem;}
.highlight{background:rgba(240,165,0,.3);border-radius:2px;color:var(--accent);}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--success);color:#000;font-weight:700;font-size:.85rem;padding:.7rem 1.4rem;border-radius:30px;transition:transform .3s;z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--danger);color:#fff;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-top:2px solid var(--accent);border-radius:16px 16px 0 0;padding:1.5rem 1.2rem 2rem;width:100%;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:1rem;font-weight:900;margin-bottom:1.2rem;color:var(--accent);}
.modal-btns{display:flex;gap:.7rem;margin-top:1rem;}
.btn-cancel{flex:1;padding:.85rem;background:#1c2030;color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<header>
  <h1>E-KAST ZOEKER</h1>
  <p class="sub">Elektriciteitskasten locaties &bull; Sappi</p>
</header>
<div class="tabs">
  <button class="tab active" id="tab-btn-search" onclick="switchTab('search')">Zoeken</button>
  <button class="tab" id="tab-btn-list" onclick="switchTab('list')">Lijst</button>
  <button class="tab" id="tab-btn-add" onclick="switchTab('add')">+ Toevoegen</button>
</div>
<main>
  <div id="tab-search" class="panel active">
    <input type="text" id="searchInput" placeholder="Typ kastnummer, ruimte of notitie..." oninput="doSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false" style="margin-top:.5rem">
    <div class="count">Gevonden: <b id="resultCount">0</b></div>
    <div id="searchResults">
      <div class="empty">
        <b>Typ een kastnummer</b>
        <span id="totalCount">Laden...</span>
        <br><span style="color:#4a9eff;font-size:2.5rem;font-weight:900;margin-top:2rem;display:block;text-align:center;letter-spacing:.1em;">Sappi</span>
      </div>
    </div>
  </div>
  <div id="tab-list" class="panel">
    <div class="filter" id="roomFilter"></div>
    <div id="listResults"></div>
  </div>
  <div id="tab-add" class="panel">
    <div class="section-title">Nieuwe kast toevoegen</div>
    <div class="form-group"><label>Jouw naam</label><input type="text" id="newName" placeholder="bv. Jan" autocomplete="off"></div>
    <div class="form-group"><label>Kastnummer / Code</label><input type="text" id="newCode" placeholder="bv. 106F03v1.p1-m1" autocomplete="off" autocorrect="off" spellcheck="false"></div>
    <div class="form-group"><label>Ruimte / Locatie</label><input type="text" id="newLocation" placeholder="bv. Stofkisten Gang" autocomplete="off" list="roomSuggestions">
      <datalist id="roomSuggestions">
        <option value="Stofkisten Gang"><option value="Omvormerruimte"><option value="3KV">
        <option value="Oprollerruimte 12"><option value="Walsen Loods"><option value="Lift 19">
        <option value="DH"><option value="E-Ruimte 774-12"><option value="E-Ruimte 775-03">
      </datalist>
    </div>
    <div class="form-group"><label>Notitie (optioneel)</label><textarea id="newNote" placeholder="bv. Linksachter bij de deur..."></textarea></div>
    <div class="form-group"><label>Status</label>
      <select id="newStatus">
        <option value="">— Geen status —</option>
        <option value="ok">✅ Veiliggesteld</option>
        <option value="warn">⚠️ In behandeling</option>
        <option value="err">❌ Probleem</option>
      </select>
    </div>
    <button class="btn-primary" id="saveBtn" onclick="addEntry()">OPSLAAN</button>
  </div>
</main>

<div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">Kast bewerken</div>
    <input type="hidden" id="editId">
    <div class="form-group"><label>Code</label><input type="text" id="editCode" autocomplete="off"></div>
    <div class="form-group"><label>Locatie</label><input type="text" id="editLocation" autocomplete="off" list="roomSuggestions"></div>
    <div class="form-group"><label>Notitie</label><textarea id="editNote"></textarea></div>
    <div class="form-group"><label>Status</label>
      <select id="editStatus">
        <option value="">— Geen status —</option>
        <option value="ok">✅ Veiliggesteld</option>
        <option value="warn">⚠️ In behandeling</option>
        <option value="err">❌ Probleem</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuleren</button>
      <button class="btn-primary" style="margin-top:0" id="editSaveBtn" onclick="saveEdit()">Opslaan</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var API = "https://script.google.com/macros/s/AKfycby4D_YucPOp6sGskAAuwPNhUXmo5qmAXpXrYjCPn9vpooYXlqVsouz1TRrsrrTVPgyzcg/exec";
var data = [];
var activeRoom = "all";
var holdTimers = {};
var HOLD_MS = 2000;

function loadData() {
  document.getElementById("totalCount").innerText = "Laden...";
  fetch(API)
    .then(function(r) { return r.json(); })
    .then(function(rows) {
      data = rows;
      document.getElementById("totalCount").innerText = data.length + " kasten beschikbaar";
      if (document.getElementById("tab-list").classList.contains("active")) renderList();
    })
    .catch(function() {
      document.getElementById("totalCount").innerText = "Fout bij laden";
    });
}

function switchTab(name) {
  document.getElementById("tab-search").classList.remove("active");
  document.getElementById("tab-list").classList.remove("active");
  document.getElementById("tab-add").classList.remove("active");
  document.getElementById("tab-btn-search").classList.remove("active");
  document.getElementById("tab-btn-list").classList.remove("active");
  document.getElementById("tab-btn-add").classList.remove("active");
  document.getElementById("tab-" + name).classList.add("active");
  document.getElementById("tab-btn-" + name).classList.add("active");
  if (name === "list") renderList();
}

function hl(text, query) {
  if (!query || !text) return text || "";
  return text.replace(new RegExp("(" + query.replace(/[.*+?^${}()|[\]\]/g, "\$&") + ")", "gi"), "<span class='highlight'>$1</span>");
}

function statusLabel(s) {
  if (s === "ok") return "✅ Veiliggesteld";
  if (s === "warn") return "⚠️ In behandeling";
  if (s === "err") return "❌ Probleem";
  return "";
}

function doSearch(value) {
  var v = value.toLowerCase();
  var results = [];
  for (var i = 0; i < data.length; i++) {
    var d = data[i];
    if (d.code.toLowerCase().indexOf(v) !== -1 || d.location.toLowerCase().indexOf(v) !== -1 || (d.note && d.note.toLowerCase().indexOf(v) !== -1)) {
      results.push(d);
    }
  }
  document.getElementById("resultCount").innerText = results.length;
  var container = document.getElementById("searchResults");
  if (value.trim() === "") {
    container.innerHTML = "<div class='empty'><b>Typ een kastnummer</b>" + data.length + " kasten beschikbaar<br><span style='color:#4a9eff;font-size:2.5rem;font-weight:900;margin-top:2rem;display:block;text-align:center;letter-spacing:.1em;'>Sappi</span></div>";
    return;
  }
  if (results.length === 0) {
    container.innerHTML = "<div class='empty'><b>Niets gevonden</b>Probeer een andere zoekterm</div>";
    return;
  }
  var html = "";
  for (var i = 0; i < results.length; i++) html += makeCard(results[i], v);
  container.innerHTML = html;
  attachHold();
}

function makeCard(item, query) {
  var id = item.id;
  var sl = statusLabel(item.status);
  var h = "<div class='card' id='card-" + id + "' onclick='selectCard(this)'>";
  h += "<div class='card-top'>";
  h += "<div class='card-info'>";
  h += "<div class='code'>" + hl(item.code, query) + "</div>";
  h += "<div class='loc'>&#128205; " + hl(item.location, query) + "</div>";
  if (item.note) h += "<div class='note'>&#128172; " + hl(item.note, query) + "</div>";
  if (sl) h += "<div style='margin-top:.4rem;font-size:.8rem;'>" + sl + "</div>";
  if (item.addedBy) h += "<div class='card-meta'>Toegevoegd door: " + item.addedBy + (item.addedDate ? " &bull; " + item.addedDate : "") + "</div>";
  h += "</div>";
  h += "<button class='btn-pencil' onclick='event.stopPropagation();toggleActions("" + id + "")'>";
  h += "<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7'/><path d='M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z'/></svg>";
  h += "</button></div>";
  h += "<div class='status-bar'>";
  h += "<button class='status-btn" + (item.status === "ok" ? " active-ok" : "") + "' onclick='event.stopPropagation();setStatus("" + id + "","ok")'>✅ Veiliggesteld</button>";
  h += "<button class='status-btn" + (item.status === "warn" ? " active-warn" : "") + "' onclick='event.stopPropagation();setStatus("" + id + "","warn")'>⚠️ Behandeling</button>";
  h += "<button class='status-btn" + (item.status === "err" ? " active-err" : "") + "' onclick='event.stopPropagation();setStatus("" + id + "","err")'>❌ Probleem</button>";
  h += "</div>";
  h += "<div class='edit-actions' id='ea-" + id + "'>";
  h += "<button class='btn-bewerk' onclick='openEdit("" + id + "")'>&#9998; Gegevens bewerken</button>";
  h += "<button class='btn-delete' id='del-" + id + "' data-id='" + id + "'><div class='hold-bar' id='bar-" + id + "'></div><span>&#128465; Houd in om te verwijderen</span></button>";
  h += "<div class='hold-hint'>2 seconden ingedrukt houden</div>";
  h += "</div></div>";
  return h;
}

function selectCard(el) {
  var cards = document.querySelectorAll(".card");
  for (var i = 0; i < cards.length; i++) cards[i].classList.remove("selected");
  el.classList.add("selected");
}

function toggleActions(id) {
  var el = document.getElementById("ea-" + id);
  if (!el) return;
  if (el.classList.contains("open")) { el.classList.remove("open"); }
  else { el.classList.add("open"); attachHold(); }
}

function setStatus(id, status) {
  for (var i = 0; i < data.length; i++) {
    if (data[i].id == id) {
      data[i].status = data[i].status === status ? "" : status;
      fetch(API, { method: "POST", body: JSON.stringify({ action: "status", id: id, status: data[i].status }) });
      doSearch(document.getElementById("searchInput").value);
      if (document.getElementById("tab-list").classList.contains("active")) renderList();
      return;
    }
  }
}

function renderList() {
  if (data.length === 0) {
    document.getElementById("roomFilter").innerHTML = "";
    document.getElementById("listResults").innerHTML = "<div class='empty'><b>Laden...</b></div>";
    return;
  }
  var rooms = ["all"];
  for (var i = 0; i < data.length; i++) {
    if (data[i].location && rooms.indexOf(data[i].location) === -1) rooms.push(data[i].location);
  }
  rooms.sort(function(a, b) { if (a === "all") return -1; if (b === "all") return 1; return a.localeCompare(b); });
  var fh = "";
  for (var i = 0; i < rooms.length; i++) {
    var r = rooms[i];
    var count = r === "all" ? data.length : data.filter(function(d) { return d.location === r; }).length;
    fh += "<span class='chip" + (activeRoom === r ? " active" : "") + "' onclick='setRoom(this,"" + r + "")'>" + (r === "all" ? "Alle (" + count + ")" : r + " (" + count + ")") + "</span>";
  }
  document.getElementById("roomFilter").innerHTML = fh;
  showFiltered();
}

function setRoom(el, r) {
  activeRoom = r;
  var chips = document.querySelectorAll(".chip");
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove("active");
  el.classList.add("active");
  showFiltered();
}

function showFiltered() {
  var filtered = [];
  for (var i = 0; i < data.length; i++) {
    if (activeRoom === "all" || data[i].location === activeRoom) filtered.push(data[i]);
  }
  filtered.sort(function(a, b) { return a.code.localeCompare(b.code); });
  var html = "";
  for (var i = 0; i < filtered.length; i++) html += makeCard(filtered[i], "");
  document.getElementById("listResults").innerHTML = html;
  attachHold();
}

function addEntry() {
  var name = document.getElementById("newName").value.trim();
  var code = document.getElementById("newCode").value.trim();
  var loc = document.getElementById("newLocation").value.trim();
  var note = document.getElementById("newNote").value.trim();
  var status = document.getElementById("newStatus").value;
  if (!name) { showToast("Vul je naam in!", true); return; }
  if (!code || !loc) { showToast("Vul code en ruimte in!", true); return; }
  var btn = document.getElementById("saveBtn");
  btn.disabled = true; btn.innerText = "Opslaan...";
  var id = Date.now().toString();
  var today = new Date().toLocaleDateString("nl-NL");
  fetch(API, { method: "POST", body: JSON.stringify({ action: "add", id: id, code: code, location: loc, note: note, status: status, addedBy: name, addedDate: today }) })
    .then(function(r) { return r.json(); })
    .then(function() {
      data.push({ id: id, code: code, location: loc, note: note, status: status, addedBy: name, addedDate: today });
      document.getElementById("newCode").value = "";
      document.getElementById("newLocation").value = "";
      document.getElementById("newNote").value = "";
      document.getElementById("newStatus").value = "";
      btn.disabled = false; btn.innerText = "OPSLAAN";
      showToast("Kast toegevoegd!");
    })
    .catch(function() { btn.disabled = false; btn.innerText = "OPSLAAN"; showToast("Fout bij opslaan!", true); });
}

function openEdit(id) {
  for (var i = 0; i < data.length; i++) {
    if (data[i].id == id) {
      document.getElementById("editId").value = id;
      document.getElementById("editCode").value = data[i].code;
      document.getElementById("editLocation").value = data[i].location;
      document.getElementById("editNote").value = data[i].note || "";
      document.getElementById("editStatus").value = data[i].status || "";
      document.getElementById("editModal").classList.add("open");
      return;
    }
  }
}

function closeModal() { document.getElementById("editModal").classList.remove("open"); }

function saveEdit() {
  var id = document.getElementById("editId").value;
  var code = document.getElementById("editCode").value.trim();
  var loc = document.getElementById("editLocation").value.trim();
  var note = document.getElementById("editNote").value.trim();
  var status = document.getElementById("editStatus").value;
  var btn = document.getElementById("editSaveBtn");
  btn.disabled = true; btn.innerText = "Opslaan...";
  fetch(API, { method: "POST", body: JSON.stringify({ action: "edit", id: id, code: code, location: loc, note: note, status: status }) })
    .then(function(r) { return r.json(); })
    .then(function() {
      for (var i = 0; i < data.length; i++) {
        if (data[i].id == id) { data[i].code = code; data[i].location = loc; data[i].note = note; data[i].status = status; break; }
      }
      btn.disabled = false; btn.innerText = "Opslaan";
      closeModal();
      doSearch(document.getElementById("searchInput").value);
      if (document.getElementById("tab-list").classList.contains("active")) renderList();
      showToast("Opgeslagen!");
    })
    .catch(function() { btn.disabled = false; btn.innerText = "Opslaan"; showToast("Fout!", true); });
}

function deleteEntry(id) {
  fetch(API, { method: "POST", body: JSON.stringify({ action: "delete", id: id }) })
    .then(function() {
      for (var i = 0; i < data.length; i++) {
        if (data[i].id == id) { data.splice(i, 1); break; }
      }
      doSearch(document.getElementById("searchInput").value);
      if (document.getElementById("tab-list").classList.contains("active")) renderList();
      showToast("Verwijderd");
    })
    .catch(function() { showToast("Fout bij verwijderen!", true); });
}

function attachHold() {
  var btns = document.querySelectorAll(".btn-delete");
  for (var i = 0; i < btns.length; i++) {
    (function(btn) {
      if (btn._att) return; btn._att = true;
      var id = btn.getAttribute("data-id");
      function start(e) {
        e.preventDefault(); btn.classList.add("holding");
        var bar = document.getElementById("bar-" + id);
        if (bar) { bar.style.transition = "width " + HOLD_MS + "ms linear"; bar.style.width = "100%"; }
        holdTimers[id] = setTimeout(function() { deleteEntry(id); }, HOLD_MS);
      }
      function stop() {
        btn.classList.remove("holding");
        var bar = document.getElementById("bar-" + id);
        if (bar) { bar.style.transition = "none"; bar.style.width = "0%"; }
        if (holdTimers[id]) { clearTimeout(holdTimers[id]); delete holdTimers[id]; }
      }
      btn.addEventListener("mousedown", start);
      btn.addEventListener("touchstart", start, { passive: false });
      btn.addEventListener("mouseup", stop);
      btn.addEventListener("mouseleave", stop);
      btn.addEventListener("touchend", stop);
      btn.addEventListener("touchcancel", stop);
    })(btns[i]);
  }
}

function showToast(msg, err) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast show" + (err ? " error" : "");
  setTimeout(function() { t.classList.remove("show"); }, 2500);
}
