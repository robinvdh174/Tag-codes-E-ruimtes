<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>E-Kast Zoeker</title>
  <style>
    :root { --bg:#0d0f12; --surface:#151820; --border:#2a3045; --accent:#f0a500; --text:#dde3f0; --muted:#5a6380; --danger:#e03c3c; --success:#2ecc71; }
    *,*::before,*::after { box-sizing:border-box; }
    body { margin:0; padding-bottom:2rem; background:var(--bg); color:var(--text); font-family: "Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; line-height:1.4; }
    header { background:var(--surface); border-bottom:2px solid var(--accent); padding:1rem 1.2rem; position:sticky; top:0; z-index:100; }
    h1 { font-size:1.3rem; font-weight:900; margin:0; }
    p.sub { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin:.3rem 0 0; }
    .tabs { display:flex; background:var(--bg); border-bottom:1px solid var(--border); padding:0 1.2rem; }
    .tab { flex:1; padding:.75rem .5rem; background:none; border:none; color:var(--muted); font-size:.85rem; font-weight:700; text-transform:uppercase; cursor:pointer; border-bottom:2px solid transparent; }
    .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    main { padding:1rem 1.2rem; }
    .panel { display:none; } .panel.active { display:block; }
    .form-group { margin-bottom:1rem; }
    label { display:block; font-size:.75rem; font-weight:700; text-transform:uppercase; color:var(--muted); margin-bottom:.4rem; }
    input[type=text], textarea { width:100%; background:var(--surface); border:1.5px solid var(--border); border-radius:8px; padding:.75rem 1rem; color:var(--text); font-size:1rem; outline:none; font-family:monospace; }
    input[type=text]:focus, textarea:focus { border-color:var(--accent); }
    .btn-primary { width:100%; padding:1rem; background:var(--accent); color:#000; border:none; border-radius:8px; font-size:1rem; font-weight:900; cursor:pointer; margin-top:.3rem; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem; margin-bottom:.7rem; border-left:3px solid var(--accent); position:relative; cursor:pointer; }
    .card.selected { border-color:var(--accent); background:#222a3f; box-shadow:0 0 0 2px var(--accent); }
    .toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(100px); background:var(--success); color:#000; font-weight:700; font-size:.85rem; padding:.7rem 1.4rem; border-radius:30px; transition:transform .3s; z-index:999; white-space:nowrap; visibility:hidden; opacity:0; }
    .toast.show { transform:translateX(-50%) translateY(0); visibility:visible; opacity:1; }
    .toast.error { background:var(--danger); color:#fff; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; align-items:flex-end; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--surface); border-top:2px solid var(--accent); border-radius:16px 16px 0 0; padding:1.5rem 1.2rem 2rem; width:100%; max-height:90vh; overflow-y:auto; }
    .modal-title { font-size:1rem; font-weight:900; margin-bottom:1.2rem; color:var(--accent); }
    .modal-btns { display:flex; gap:.7rem; margin-top:1rem; }
    .btn-cancel, .btn-save { flex:1; padding:.85rem; border-radius:8px; font-size:.9rem; font-weight:700; cursor:pointer; border:1px solid var(--border); }
    .btn-cancel { background:#1c2030; color:var(--text); }
    .btn-save { background:var(--accent); color:#000; border:none; }
    .empty { text-align:center; padding:3rem 1rem; color:var(--muted); }
    .empty b { display:block; color:var(--text); font-size:1.1rem; margin:.5rem 0 .3rem; }
  </style>
</head>
<body>
  <header>
    <h1>E-Kast Zoeker</h1>
    <p class="sub">Snel zoeken en beheren</p>
  </header>
  <div class="tabs" role="tablist">
    <button class="tab active" role="tab" aria-selected="true" aria-controls="panel-1" id="tab-1">Zoeken</button>
    <button class="tab" role="tab" aria-selected="false" aria-controls="panel-2" id="tab-2">Instellingen</button>
  </div>
  <main>
    <section id="panel-1" class="panel active" role="tabpanel" aria-labelledby="tab-1">
      <div class="form-group">
        <label for="search">Zoekterm</label>
        <input id="search" type="text" placeholder="Typ locatie of code..." />
      </div>
      <div id="cards"></div>
      <div class="empty" id="emptyState" hidden>
        <b>Geen resultaten</b> Probeer een andere zoekterm.
      </div>
    </section>
    <section id="panel-2" class="panel" role="tabpanel" aria-labelledby="tab-2">
      <p>Instellingen komen hier.</p>
    </section>
  </main>

  <div class="modal-overlay" id="editModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalDesc" tabindex="-1">
    <div class="modal" role="document">
      <h2 id="modalTitle" class="modal-title">Bewerk item</h2>
      <p id="modalDesc" class="note">Wijzig gegevens en klik opslaan.</p>
      <div class="form-group">
        <label for="editLocation">Locatie</label>
        <input id="editLocation" type="text" required minlength="2" maxlength="50">
      </div>
      <div class="form-group">
        <label for="editCode">Code</label>
        <input id="editCode" type="text" required minlength="2" maxlength="32">
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" id="cancelEdit">Annuleren</button>
        <button class="btn-save" id="saveEdit">Opslaan</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script id="d" type="application/json">
  [
    {"id":1,"locatie":"A1","code":"ABC123"},
    {"id":2,"locatie":"B2","code":"DEF456"},
    {"id":3,"locatie":"C3","code":"GHI789"}
  ]
  </script>

  <script>
    const dataEl = document.querySelector('#d');
    const data = JSON.parse(dataEl.textContent);
    const cardsEl = document.querySelector('#cards');
    const emptyState = document.querySelector('#emptyState');
    const toast = document.querySelector('#toast');
    const searchInput = document.querySelector('#search');
    const tabs = document.querySelectorAll('.tab');
    const panels = document.querySelectorAll('.panel');
    const editModal = document.querySelector('#editModal');
    const editLocation = document.querySelector('#editLocation');
    const editCode = document.querySelector('#editCode');
    const cancelEdit = document.querySelector('#cancelEdit');
    const saveEdit = document.querySelector('#saveEdit');

    let editId = null;

    function showToast(message, isError=false) {
      toast.textContent = message;
      toast.className = `toast ${isError ? 'error' : ''} show`;
      setTimeout(()=>toast.classList.remove('show'), 2000);
    }

    function render(items) {
      cardsEl.innerHTML = '';
      if (!items.length) {
        emptyState.hidden = false;
        return;
      }
      emptyState.hidden = true;
      items.forEach(item => {
        const article = document.createElement('article');
        article.className ='card';
        article.tabIndex=0;
        article.innerHTML = `
          <div class="card-top">
            <div class="card-info">
              <div class="loc">${item.locatie} — ${item.code}</div>
            </div>
            <button class="btn-pencil" aria-label="Bewerk ${item.code}" data-id="${item.id}">✎</button>
          </div>
        `;
        article.querySelector('.btn-pencil').addEventListener('click', (ev)=> {
          ev.stopPropagation();
          openEdit(item);
        });
        article.addEventListener('click', ()=>openEdit(item));
        cardsEl.appendChild(article);
      });
    }

    function filterAndRender() {
      const q = searchInput.value.trim().toLowerCase();
      const result = data.filter(i => i.locatie.toLowerCase().includes(q) || i.code.toLowerCase().includes(q));
      render(result);
    }

    function openEdit(item) {
      editId = item.id;
      editLocation.value = item.locatie;
      editCode.value = item.code;
      editModal.classList.add('open');
      editModal.setAttribute('aria-hidden','false');
      editModal.focus();
    }

    function closeEdit() {
      editModal.classList.remove('open');
      editModal.setAttribute('aria-hidden','true');
      editId = null;
    }

    function saveChanges() {
      if (!editLocation.value.trim() || !editCode.value.trim()) {
        showToast('Vul alle velden in', true);
        return;
      }
      const item = data.find(d=>d.id===editId);
      if (!item) { showToast('Item niet gevonden', true); return; }
      item.locatie = editLocation.value.trim();
      item.code = editCode.value.trim();
      filterAndRender();
      closeEdit();
      showToast('Opgeslagen');
    }

    searchInput.addEventListener('input', filterAndRender);
    cancelEdit.addEventListener('click', closeEdit);
    saveEdit.addEventListener('click', saveChanges);
    editModal.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeEdit(); });
    tabs.forEach((tab, idx)=> {
      tab.addEventListener('click', ()=> {
        tabs.forEach(t=> { t.classList.remove('active'); t.setAttribute('aria-selected','false'); });
        tab.classList.add('active'); tab.setAttribute('aria-selected','true');
        panels.forEach(p=>p.classList.remove('active'));
        panels[idx].classList.add('active');
      });
    });

    render(data);
  </script>
</body>
</html>
