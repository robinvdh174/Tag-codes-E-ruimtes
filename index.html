<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>E-Kast Zoeker</title>
<style>
:root{--bg:#0d0f12;--surface:#151820;--border:#2a3045;--accent:#f0a500;--text:#dde3f0;--muted:#5a6380;--danger:#e03c3c;--success:#2ecc71;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:sans-serif;padding-bottom:2rem;}
header{background:var(--surface);border-bottom:2px solid var(--accent);padding:1rem 1.2rem;position:sticky;top:0;z-index:100;}
h1{font-size:1.3rem;font-weight:900;}
p.sub{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);padding:0 1.2rem;}
.tab{flex:1;padding:.75rem .5rem;background:none;border:none;color:var(--muted);font-size:.85rem;font-weight:700;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
main{padding:1rem 1.2rem;}
.panel{display:none;}
.panel.active{display:block;}
input[type=text],textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:.75rem 1rem;color:var(--text);font-size:1rem;outline:none;font-family:monospace;-webkit-appearance:none;}
input[type=text]:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:60px;}
.form-group{margin-bottom:1rem;}
label{display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;letter-spacing:.08em;}
.btn-primary{width:100%;padding:1rem;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:1rem;font-weight:900;cursor:pointer;margin-top:.3rem;}
.btn-primary:active{opacity:.85;}
.count{font-size:.75rem;color:var(--muted);margin-bottom:.8rem;font-family:monospace;}
.count b{color:var(--accent);}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.7rem;border-left:3px solid var(--accent);position:relative;cursor:pointer;transition:border-color .15s,background .15s;}.card.selected{border-color:var(--accent);background:#222a3f;border-left:3px solid var(--accent);box-shadow:0 0 0 2px var(--accent);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;}
.card-info{flex:1;min-width:0;}
.code{font-family:monospace;font-size:1rem;color:var(--accent);margin-bottom:.3rem;word-break:break-all;}
.loc{font-size:.95rem;font-weight:700;}
.note{font-size:.8rem;color:#7a8aaa;font-style:italic;margin-top:.3rem;}

/* EDIT TOGGLE BUTTON */
.btn-edit-toggle{background:none;border:none;cursor:pointer;padding:.2rem;color:var(--muted);flex-shrink:0;opacity:.6;transition:opacity .15s;}
.btn-edit-toggle:active{opacity:1;}
.btn-edit-toggle svg{width:18px;height:18px;display:block;}

/* EDIT ACTIONS - hidden by default */
.edit-actions{display:none;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);}
.edit-actions.open{display:block;}
.btn-delete{width:100%;padding:.6rem;border-radius:6px;border:1px solid var(--border);background:#1c2030;color:var(--muted);font-size:.8rem;cursor:pointer;position:relative;overflow:hidden;user-select:none;-webkit-user-select:none;text-align:center;}
.btn-delete.holding{border-color:var(--danger);color:var(--danger);}
.hold-bar{position:absolute;left:0;top:0;bottom:0;width:0%;background:rgba(224,60,60,.3);}
.btn-delete span{position:relative;z-index:1;}
.hold-hint{font-size:.65rem;color:var(--muted);margin-top:.3rem;font-family:monospace;opacity:.7;text-align:center;}
.btn-edit-open{width:100%;padding:.6rem;border-radius:6px;border:1px solid var(--border);background:#1c2030;color:var(--muted);font-size:.8rem;cursor:pointer;text-align:center;margin-bottom:.5rem;}
.btn-edit-open:active{background:var(--border);}

.empty{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty b{display:block;color:var(--text);font-size:1.1rem;margin:.5rem 0 .3rem;}
.filter{display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.5rem;margin-bottom:1rem;}
.chip{padding:.35rem .8rem;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:.75rem;white-space:nowrap;cursor:pointer;font-family:monospace;}
.chip.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.section-title{font-size:.7rem;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.12em;margin-bottom:.8rem;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--success);color:#000;font-weight:700;font-size:.85rem;padding:.7rem 1.4rem;border-radius:30px;transition:transform .3s;z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--danger);color:#fff;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-top:2px solid var(--accent);border-radius:16px 16px 0 0;padding:1.5rem 1.2rem 2rem;width:100%;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:1rem;font-weight:900;margin-bottom:1.2rem;color:var(--accent);}
.modal-btns{display:flex;gap:.7rem;margin-top:1rem;}
.btn-cancel{flex:1;padding:.85rem;background:#1c2030;color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<header>
  <h1>E-KAST ZOEKER</h1>
  <p class="sub">Elektriciteitskasten locaties</p>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('search')">Zoeken</button>
  <button class="tab" onclick="switchTab('list')">Lijst</button>
  <button class="tab" onclick="switchTab('add')">+ Toevoegen</button>
</div>
<main>
  <div id="tab-search" class="panel active">
    <input type="text" id="searchInput" placeholder="Typ kastnummer of ruimte..." oninput="doSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false" style="margin-top:.5rem">
    <div class="count">Gevonden: <b id="resultCount">0</b></div>
    <div id="searchResults"><div class="empty"><b>Typ een kastnummer</b>318 kasten beschikbaar<br><span style="color:#4a9eff;font-size:2.5rem;font-weight:900;margin-top:2rem;display:block;text-align:center;letter-spacing:.1em;">Sappi</span></div></div>
  </div>
  <div id="tab-list" class="panel">
    <div class="filter" id="roomFilter"></div>
    <div id="listResults"></div>
  </div>
  <div id="tab-add" class="panel">
    <div class="section-title">Nieuwe kast toevoegen</div>
    <div class="form-group">
      <label>Jouw naam</label>
      <input type="text" id="newName" placeholder="bv. Jan" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Kastnummer / Code</label>
      <input type="text" id="newCode" placeholder="bv. 106F03v1.p1-m1" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="form-group">
      <label>Ruimte / Locatie</label>
      <input type="text" id="newLocation" placeholder="bv. Stofkisten Gang" autocomplete="off" list="roomSuggestions">
      <datalist id="roomSuggestions">
        <option value="Stofkisten Gang">
        <option value="Omvormerruimte">
        <option value="3KV">
        <option value="Oprollerruimte 12">
        <option value="Walsen Loods">
        <option value="Lift 19">
        <option value="DH">
      </datalist>
    </div>
    <div class="form-group">
      <label>Notitie (optioneel)</label>
      <textarea id="newNote" placeholder="bv. Linksachter bij de deur..."></textarea>
    </div>
    <button class="btn-primary" onclick="addEntry()">OPSLAAN</button>
  </div>
</main>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">Kast bewerken</div>
    <input type="hidden" id="editId">
    <div class="form-group"><label>Kastnummer / Code</label><input type="text" id="editCode" autocomplete="off" autocorrect="off" spellcheck="false"></div>
    <div class="form-group"><label>Ruimte / Locatie</label><input type="text" id="editLocation" autocomplete="off" list="roomSuggestions"></div>
    <div class="form-group"><label>Notitie</label><textarea id="editNote"></textarea></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuleren</button>
      <button class="btn-primary" style="margin-top:0" onclick="saveEdit()">Opslaan</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

try {
  var saved = localStorage.getItem("ekast-v6");
  if (saved) {
    var changes = JSON.parse(saved);
    var origIds = {};
    for (var i = 0; i < data.length; i++) origIds[data[i].id] = i;
    for (var i = 0; i < changes.length; i++) {
      var c = changes[i];
      if (origIds[c.id] !== undefined) { data[origIds[c.id]] = c; } else { data.push(c); }
    }
  }
} catch(e) {}

function saveLocal() {
  try {
    var origMap = {};
    for (var i = 0; i < ORIG.length; i++) origMap[ORIG[i].id] = ORIG[i];
    var changes = [];
    for (var i = 0; i < data.length; i++) {
      var d = data[i];
      if (!origMap[d.id] || JSON.stringify(origMap[d.id]) !== JSON.stringify(d)) changes.push(d);
    }
    localStorage.setItem("ekast-v6", JSON.stringify(changes));
  } catch(e) {}
}

function switchTab(tab) {
  var panels = document.querySelectorAll(".panel");
  for (var i = 0; i < panels.length; i++) panels[i].classList.remove("active");
  var tabs = document.querySelectorAll(".tab");
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
  document.getElementById("tab-" + tab).classList.add("active");
  if (tab === "search") tabs[0].classList.add("active");
  else if (tab === "list") { tabs[1].classList.add("active"); renderList(); }
  else tabs[2].classList.add("active");
}

function selectCard(el) {
  var cards = document.querySelectorAll(".card");
  for (var i = 0; i < cards.length; i++) cards[i].classList.remove("selected");
  el.classList.add("selected");
}

function doSearch(value) {
  var v = value.toLowerCase();
  var results = [];
  for (var i = 0; i < data.length; i++) {
    if (data[i].code.toLowerCase().indexOf(v) !== -1 || data[i].location.toLowerCase().indexOf(v) !== -1 || (data[i].note && data[i].note.toLowerCase().indexOf(v) !== -1)) {
      results.push(data[i]);
    }
  }
  document.getElementById("resultCount").innerText = results.length;
  var container = document.getElementById("searchResults");
  if (value.trim() === "") {
    container.innerHTML = "<div class=\"empty\"><b>Typ een kastnummer</b>" + data.length + " kasten beschikbaar<br><span style=\"color:#4a9eff;font-size:2.5rem;font-weight:900;margin-top:2rem;display:block;text-align:center;letter-spacing:.1em;\">Sappi</span></div>";
    return;
  }
  if (results.length === 0) {
    container.innerHTML = "<div class=\"empty\"><b>Niets gevonden</b>Probeer een andere zoekterm</div>";
    return;
  }
  var html = "";
  for (var i = 0; i < results.length; i++) html += renderCard(results[i]);
  container.innerHTML = html;
  attachHold();
}

function renderCard(item) {
  var id = item.id;
  var statusHtml = "";
  if (item.status === "ok") statusHtml = "<div style=\"font-size:.8rem;margin-top:.3rem;color:#2ecc71;\">&#9989; Veiliggesteld</div>";
  else if (item.status === "warn") statusHtml = "<div style=\"font-size:.8rem;margin-top:.3rem;color:#f0a500;\">&#9888; In behandeling</div>";
  else if (item.status === "err") statusHtml = "<div style=\"font-size:.8rem;margin-top:.3rem;color:#e03c3c;\">&#10060; Probleem</div>";
  var metaHtml = item.addedby ? "<div style=\"font-size:.7rem;color:#5a6380;margin-top:.3rem;\">Door: " + item.addedby + (item.addeddate ? " &bull; " + item.addeddate : "") + "</div>" : "";
  var h = "<div class=\"card\" id=\"card-" + id + "\" onclick=\"selectCard(this)\">" +
    "<div class=\"card-top\">" +
      "<div class=\"card-info\">" +
        "<div class=\"code\">" + item.code + "</div>" +
        "<div class=\"loc\">&#128205; " + item.location + "</div>" +
        (item.note ? "<div class=\"note\">&#128172; " + item.note + "</div>" : "") +
        statusHtml + metaHtml +
      "</div>" +
      "<button class=\"btn-pencil\" onclick=\"event.stopPropagation();toggleActions('" + id + "')\">" +
        "<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7\"/><path d=\"M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z\"/></svg>" +
      "</button>" +
    "</div>" +
    "<div style=\"display:flex;gap:.4rem;margin-top:.6rem;\">" +
      "<button style=\"flex:1;padding:.35rem;border-radius:6px;border:1px solid " + (item.status==="ok"?"#2ecc71":"#2a3045") + ";background:" + (item.status==="ok"?"#1a3a2a":"#1c2030") + ";color:" + (item.status==="ok"?"#2ecc71":"#5a6380") + ";font-size:.72rem;cursor:pointer;\" onclick=\"event.stopPropagation();setStatus('" + id + "','ok')\">&#9989; Veilig</button>" +
      "<button style=\"flex:1;padding:.35rem;border-radius:6px;border:1px solid " + (item.status==="warn"?"#f0a500":"#2a3045") + ";background:" + (item.status==="warn"?"#3a2a00":"#1c2030") + ";color:" + (item.status==="warn"?"#f0a500":"#5a6380") + ";font-size:.72rem;cursor:pointer;\" onclick=\"event.stopPropagation();setStatus('" + id + "','warn')\">&#9888; Bezig</button>" +
      "<button style=\"flex:1;padding:.35rem;border-radius:6px;border:1px solid " + (item.status==="err"?"#e03c3c":"#2a3045") + ";background:" + (item.status==="err"?"#3a1a1a":"#1c2030") + ";color:" + (item.status==="err"?"#e03c3c":"#5a6380") + ";font-size:.72rem;cursor:pointer;\" onclick=\"event.stopPropagation();setStatus('" + id + "','err')\">&#10060; Probleem</button>" +
    "</div>" +
    "<div class=\"edit-actions\" id=\"ea-" + id + "\">" +
      "<button class=\"btn-bewerk\" onclick=\"openEdit('" + id + "')\">&#9998; Gegevens bewerken</button>" +
      "<button class=\"btn-delete\" id=\"del-" + id + "\" data-id=\"" + id + "\"><div class=\"hold-bar\" id=\"bar-" + id + "\"></div><span>&#128465; Houd in om te verwijderen</span></button>" +
      "<div class=\"hold-hint\">2 seconden ingedrukt houden</div>" +
    "</div>" +
  "</div>";
  return h;
}


function toggleEdit(id) {
  var actions = document.getElementById("actions-" + id);
  if (actions) actions.classList.toggle("open");
  attachHold();
}

function renderList() {
  var rooms = ["all"];
  for (var i = 0; i < data.length; i++) {
    if (data[i].location && rooms.indexOf(data[i].location) === -1) rooms.push(data[i].location);
  }
  rooms.sort(function(a, b) { if (a === "all") return -1; if (b === "all") return 1; return a.localeCompare(b); });
  var fhtml = "";
  for (var i = 0; i < rooms.length; i++) {
    var r = rooms[i];
    var lbl = r === "all" ? "Alle (" + data.length + ")" : r;
    fhtml += "<span class=\"chip" + (activeRoom === r ? " active" : "") + "\" onclick=\"setRoom(this, \'" + r + "\')\">" + lbl + "</span>";
  }
  document.getElementById("roomFilter").innerHTML = fhtml;
  showFiltered();
}

function setRoom(el, r) {
  activeRoom = r;
  var chips = document.querySelectorAll(".chip");
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove("active");
  el.classList.add("active");
  showFiltered();
}

function showFiltered() {
  var filtered = [];
  for (var i = 0; i < data.length; i++) {
    if (activeRoom === "all" || data[i].location === activeRoom) filtered.push(data[i]);
  }
  filtered.sort(function(a, b) { return a.code.localeCompare(b.code); });
  var html = "";
  for (var i = 0; i < filtered.length; i++) html += renderCard(filtered[i]);
  document.getElementById("listResults").innerHTML = html;
  attachHold();
}

function addEntry() {
  var name = document.getElementById("newName").value.trim();
  var code = document.getElementById("newCode").value.trim();
  var loc = document.getElementById("newLocation").value.trim();
  var note = document.getElementById("newNote").value.trim();
  if (!name) { showToast("Vul je naam in!", true); return; }
  if (!code || !loc) { showToast("Vul code en ruimte in!", true); return; }
  var id = Date.now().toString();
  var today = new Date().toLocaleDateString("nl-NL");
  data.push({ id: id, code: code, location: loc, note: note, addedby: name, addeddate: today, status: "" });
  saveLocal();
  try { fetch(API, { method: "POST", body: JSON.stringify({ action: "add", id: id, code: code, location: loc, note: note, addedBy: name, addedDate: today, status: "" }) }).catch(function(){}); } catch(e) {}
  document.getElementById("newName").value = "";
  document.getElementById("newCode").value = "";
  document.getElementById("newLocation").value = "";
  document.getElementById("newNote").value = "";
  showToast("Kast toegevoegd!");
}

function openEdit(id) {
  var item = null;
  for (var i = 0; i < data.length; i++) { if (data[i].id === id) { item = data[i]; break; } }
  if (!item) return;
  document.getElementById("editId").value = id;
  document.getElementById("editCode").value = item.code;
  document.getElementById("editLocation").value = item.location;
  document.getElementById("editNote").value = item.note || "";
  document.getElementById("editModal").classList.add("open");
}

function closeModal() { document.getElementById("editModal").classList.remove("open"); }

function saveEdit() {
  var id = document.getElementById("editId").value;
  for (var i = 0; i < data.length; i++) {
    if (data[i].id === id) {
      data[i].code = document.getElementById("editCode").value.trim();
      data[i].location = document.getElementById("editLocation").value.trim();
      data[i].note = document.getElementById("editNote").value.trim();
      break;
    }
  }
  saveLocal();
  closeModal();
  doSearch(document.getElementById("searchInput").value);
  if (document.getElementById("tab-list").classList.contains("active")) renderList();
  showToast("Opgeslagen!");
}

function setStatus(id, newStatus) {
  for (var i = 0; i < data.length; i++) {
    if (data[i].id == id) {
      data[i].status = data[i].status === newStatus ? "" : newStatus;
      saveLocal();
      try { fetch(API, { method: "POST", body: JSON.stringify({ action: "status", id: id, status: data[i].status }) }).catch(function(){}); } catch(e) {}
      renderAll();
      return;
    }
  }
}

function deleteEntry(id) {
  for (var i = 0; i < data.length; i++) {
    if (data[i].id === id) { data.splice(i, 1); break; }
  }
  saveLocal();
  doSearch(document.getElementById("searchInput").value);
  if (document.getElementById("tab-list").classList.contains("active")) renderList();
  showToast("Verwijderd");
}

function attachHold() {
  var btns = document.querySelectorAll(".btn-delete");
  for (var i = 0; i < btns.length; i++) {
    (function(btn) {
      if (btn._attached) return;
      btn._attached = true;
      var id = btn.getAttribute("data-id");
      function start(e) {
        e.preventDefault();
        btn.classList.add("holding");
        var bar = document.getElementById("bar-" + id);
        if (bar) { bar.style.transition = "width " + HOLD_MS + "ms linear"; bar.style.width = "100%"; }
        holdTimers[id] = setTimeout(function() { deleteEntry(id); }, HOLD_MS);
      }
      function cancel() {
        btn.classList.remove("holding");
        var bar = document.getElementById("bar-" + id);
        if (bar) { bar.style.transition = "none"; bar.style.width = "0%"; }
        if (holdTimers[id]) { clearTimeout(holdTimers[id]); delete holdTimers[id]; }
      }
      btn.addEventListener("mousedown", start);
      btn.addEventListener("touchstart", start, { passive: false });
      btn.addEventListener("mouseup", cancel);
      btn.addEventListener("mouseleave", cancel);
      btn.addEventListener("touchend", cancel);
      btn.addEventListener("touchcancel", cancel);
    })(btns[i]);
  }
}

function showToast(msg, isError) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isError ? " error" : "");
  setTimeout(function() { t.classList.remove("show"); }, 2500);
}

document.getElementById("editModal").addEventListener("click", function(e) { if (e.target === this) closeModal(); });
renderList();
setTimeout(function() {
  try {
    fetch(API).then(function(r){return r.json();}).then(function(rows){
      if(rows&&rows.length>0){data=rows;renderAll();}
    }).catch(function(){});
  } catch(e){}
},500);
</script>
