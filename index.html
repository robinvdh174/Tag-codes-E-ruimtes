<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>E-Kast Zoeker</title>
<style>
:root{--bg:#0d0f12;--surface:#151820;--border:#2a3045;--accent:#f0a500;--text:#dde3f0;--muted:#5a6380;--danger:#e03c3c;--success:#2ecc71;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:sans-serif;padding-bottom:2rem;}
header{background:var(--surface);border-bottom:2px solid var(--accent);padding:1rem 1.2rem;position:sticky;top:0;z-index:100;}
h1{font-size:1.3rem;font-weight:900;}
p.sub{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);padding:0 1.2rem;}
.tab{flex:1;padding:.75rem .5rem;background:none;border:none;color:var(--muted);font-size:.85rem;font-weight:700;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
main{padding:1rem 1.2rem;}
.panel{display:none;}.panel.active{display:block;}
input[type=text],textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:.75rem 1rem;color:var(--text);font-size:1rem;outline:none;font-family:monospace;-webkit-appearance:none;}
input[type=text]:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:60px;font-family:sans-serif;}
.form-group{margin-bottom:1rem;}
label{display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
.btn-primary{width:100%;padding:1rem;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:1rem;font-weight:900;cursor:pointer;margin-top:.3rem;}
.count{font-size:.75rem;color:var(--muted);margin-bottom:.8rem;font-family:monospace;}
.count b{color:var(--accent);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.7rem;border-left:3px solid var(--accent);position:relative;cursor:pointer;}
.card.selected{border-color:var(--accent);background:#222a3f;box-shadow:0 0 0 2px var(--accent);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;}
.card-info{flex:1;min-width:0;}
.code{font-family:monospace;font-size:1rem;color:var(--accent);margin-bottom:.3rem;word-break:break-all;}
.loc{font-size:.95rem;font-weight:700;}
.note{font-size:.8rem;color:#7a8aaa;font-style:italic;margin-top:.3rem;}
.meta{font-size:.7rem;color:var(--muted);margin-top:.3rem;}
.status-row{margin-top:.6rem;}
.sbtn-veilig{display:inline-block;padding:.25rem .7rem;border-radius:20px;border:1px solid #2ecc71;background:#1a3a2a;color:#2ecc71;font-size:.72rem;cursor:pointer;font-family:sans-serif;font-weight:700;}
.sbtn-veilig.secured{border-color:#f0a500;background:#3a2a00;color:#f0a500;}
.btn-pencil{background:none;border:none;cursor:pointer;padding:.3rem;color:var(--muted);flex-shrink:0;opacity:.6;}
.btn-pencil svg{width:18px;height:18px;display:block;}
.edit-actions{display:none;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);}
.edit-actions.open{display:block;}
.btn-bewerk{width:100%;padding:.6rem;border-radius:6px;border:1px solid var(--border);background:#1c2030;color:var(--muted);font-size:.8rem;cursor:pointer;text-align:center;margin-bottom:.5rem;font-family:sans-serif;}
.btn-delete{width:100%;padding:.6rem;border-radius:6px;border:1px solid var(--border);background:#1c2030;color:var(--muted);font-size:.8rem;cursor:pointer;position:relative;overflow:hidden;user-select:none;-webkit-user-select:none;text-align:center;font-family:sans-serif;}
.btn-delete.holding{border-color:var(--danger);color:var(--danger);}
.hold-bar{position:absolute;left:0;top:0;bottom:0;width:0%;background:rgba(224,60,60,.3);}
.btn-delete span{position:relative;z-index:1;}
.hold-hint{font-size:.65rem;color:var(--muted);margin-top:.3rem;opacity:.7;text-align:center;}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty b{display:block;color:var(--text);font-size:1.1rem;margin:.5rem 0 .3rem;}
.filter{display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.5rem;margin-bottom:1rem;}
.chip{padding:.35rem .8rem;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:.75rem;white-space:nowrap;cursor:pointer;font-family:monospace;}
.chip.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.section-title{font-size:.7rem;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.12em;margin-bottom:.8rem;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--success);color:#000;font-weight:700;font-size:.85rem;padding:.7rem 1.4rem;border-radius:30px;transition:transform .3s;z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--danger);color:#fff;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-top:2px solid var(--accent);border-radius:16px 16px 0 0;padding:1.5rem 1.2rem 2rem;width:100%;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:1rem;font-weight:900;margin-bottom:1.2rem;color:var(--accent);}
.modal-btns{display:flex;gap:.7rem;margin-top:1rem;}
.btn-cancel{flex:1;padding:.85rem;background:#1c2030;color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<header>
  <h1>E-Kast Zoeker</h1>
  <p class="sub">Vind snel je kastlocatie</p>
</header>
<div class="tabs" role="tablist">
  <button class="tab active" role="tab" aria-selected="true" aria-controls="tab1">Zoeken</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="tab2">Instellingen</button>
</div>
<main>
  <section id="tab1" class="panel active" role="tabpanel">
    <div class="form-group">
      <label for="search">Zoekterm</label>
      <input id="search" type="text" placeholder="typ locatie of code..." />
    </div>
    <div id="cards"></div>
    <div class="empty" id="emptyState" hidden>
      <b>Geen resultaten</b> Probeer een andere zoekterm.
    </div>
  </section>
  <section id="tab2" class="panel" role="tabpanel">
    <p>Instellingen hier inzetten</p>
  </section>
</main>

<div class="modal-overlay" id="editModal" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <h2 class="modal-title">Item bewerken</h2>
    <div class="form-group">
      <label for="editLocation">Locatie</label>
      <input id="editLocation" type="text" required minlength="1" />
    </div>
    <div class="form-group">
      <label for="editCode">Code</label>
      <input id="editCode" type="text" required minlength="1" />
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="cancelEdit">Annuleren</button>
      <button class="btn-primary" id="saveEdit">Opslaan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script id="d" type="application/json">
[
  {"id":1,"locatie":"A1","code":"ABC123"},
  {"id":2,"locatie":"B2","code":"DEF456"},
  {"id":3,"locatie":"C3","code":"GHI789"}
]
</script>

<script>
const ds = document.querySelector('#d');
let data = [];
try {
  data = JSON.parse(ds.textContent);
} catch (err) {
  console.error('JSON parse error in #d data', err);
  data = [];
}
const cardsEl = document.querySelector('#cards');
const emptyState = document.querySelector('#emptyState');
const toastEl = document.querySelector('#toast');
const searchInput = document.querySelector('#search');
const tabs = document.querySelectorAll('.tab');
const panels = document.querySelectorAll('.panel');

const editModal = document.querySelector('#editModal');
const editLocation = document.querySelector('#editLocation');
const editCode = document.querySelector('#editCode');
const cancelEdit = document.querySelector('#cancelEdit');
const saveEdit = document.querySelector('#saveEdit');
let editingId = null;

function showToast(msg, isError = false) {
  toastEl.textContent = msg;
  toastEl.className = isError ? 'toast error show' : 'toast show';
  setTimeout(() => toastEl.classList.remove('show'), 2000);
}
function render(items) {
  cardsEl.innerHTML = '';
  if (!items.length) {
    emptyState.hidden = false;
    return;
  }
  emptyState.hidden = true;
  items.forEach(item => {
    const card = document.createElement('article');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        <div class="card-info">
          <p class="loc">${item.locatie} - ${item.code}</p>
        </div>
        <button class="btn-pencil" aria-label="Bewerk ${item.code}">✎</button>
      </div>`;
    card.querySelector('.btn-pencil').addEventListener('click', e => {
      e.stopPropagation();
      openModal(item.id);
    });
    card.addEventListener('click', () => openModal(item.id));
    cardsEl.appendChild(card);
  });
}
function refresh() {
  const q = searchInput.value.trim().toLowerCase();
  const filtered = data.filter(item =>
    item.locatie.toLowerCase().includes(q) || item.code.toLowerCase().includes(q)
  );
  render(filtered);
}
function openModal(id) {
  const item = data.find(i => i.id === id);
  if (!item) return;
  editingId = id;
  editLocation.value = item.locatie;
  editCode.value = item.code;
  editModal.classList.add('open');
}
function closeModal() {
  editModal.classList.remove('open');
  editingId = null;
}
function saveEditItem() {
  if (!editingId) return;
  const item = data.find(i => i.id === editingId);
  if (!item) return;
  item.locatie = editLocation.value.trim();
  item.code = editCode.value.trim();
  if (!item.locatie || !item.code) {
    showToast('Vul beide velden in', true);
    return;
  }
  showToast('Opgeslagen');
  closeModal();
  refresh();
}

searchInput.addEventListener('input', refresh);
cancelEdit.addEventListener('click', closeModal);
saveEdit.addEventListener('click', saveEditItem);
window.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

tabs.forEach((tab, i) => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    panels.forEach(p => p.classList.remove('active'));
    panels[i].classList.add('active');
  });
});

refresh();
</script>
</body>
</html>
